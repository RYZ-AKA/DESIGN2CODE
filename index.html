<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design2Code-Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap');

        body {
            font-family: 'Josefin Sans', sans-serif;
            background-color: #0f172a;
            color: #ecf0f1;
            overflow: hidden;
        }

        .font-logo {
            font-family: 'Dancing Script', cursive;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Canvas Grid Pattern - Moved to Page */
        .bg-grid-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Utility for glass morphism */
        .glass-panel {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Selection Overlay & Resize Handles */
        #selection-overlay {
            position: absolute;
            border: 2px solid #3b82f6;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #3b82f6;
            border: 1px solid white;
            border-radius: 50%;
            pointer-events: auto;
            z-index: 1001;
        }
        
        /* Corners */
        .handle-nw { top: -6px; left: -6px; cursor: nw-resize; }
        .handle-ne { top: -6px; right: -6px; cursor: ne-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .handle-se { bottom: -6px; right: -6px; cursor: se-resize; }
        
        /* Edges */
        .handle-n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .handle-s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .handle-e { top: 50%; right: -6px; transform: translateY(-50%); cursor: e-resize; }
        .handle-w { top: 50%; left: -6px; transform: translateY(-50%); cursor: w-resize; }

        /* Toolbar Styles */
        details > summary {
            list-style: none;
            outline: none;
            cursor: pointer;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            padding: 0.5rem;
        }

        /* Page Frame on Canvas */
        .page-frame {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 2px;
            position: relative;
        }
        .page-frame::after {
            content: "Page " attr(data-page);
            position: absolute;
            top: 10px;
            left: -80px;
            color: #64748b;
            font-size: 14px;
            font-weight: bold;
        }
        .page-separator {
            border-bottom: 2px dashed #94a3b8;
            position: absolute;
            left: 0;
            width: 100%;
            bottom: 0;
            pointer-events: none;
        }

        /* Layers Panel Items */
        .layer-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            font-size: 13px;
            transition: background 0.2s;
        }
        .layer-item:hover {
            background-color: rgba(51, 65, 85, 0.5);
        }
        .layer-item.active {
            background-color: #2563eb;
            color: white;
        }

        /* Inspector Mode */
        .inspector-active {
            cursor: crosshair !important;
        }
        .inspector-hover {
            outline: 2px dashed #22d3ee !important; /* Cyan outline */
            outline-offset: 2px;
        }
        
        /* Locked Element Styling in Layer Panel */
        .layer-item.locked .layer-name {
            color: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-900 text-white select-none">
    <!-- ================= VIEW: EDITOR ================= -->
    <div id="view-editor" class="flex flex-col bg-[#1a252f] h-screen w-screen overflow-hidden">
        <!-- Top Bar -->
        <header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-4 z-50 relative shrink-0">
            <div class="flex items-center gap-4">
                <h1 id="editor-project-title" class="text-lg font-semibold text-white">Untitled Project</h1>
                
                <!-- History Controls -->
                <div class="flex items-center gap-1 ml-4">
                    <button onclick="Editor.undo()" id="btn-undo" class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Undo (Ctrl+Z)">
                        <i data-lucide="undo" class="w-4 h-4"></i>
                    </button>
                    <button onclick="Editor.redo()" id="btn-redo" class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Redo (Ctrl+Y)">
                        <i data-lucide="redo" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Grid Toggle -->
                <button onclick="Editor.toggleGrid()" id="btn-grid" class="p-2 hover:bg-slate-700 rounded-lg text-slate-400 hover:text-white transition-colors ml-2" title="Toggle Snap to Grid">
                    <i data-lucide="grid" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="Editor.viewCode()" class="flex items-center px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm transition-colors" title="View/Copy HTML Code">
                    <i data-lucide="code" class="w-4 h-4 mr-2"></i> Code
                </button>
                <button onclick="Editor.previewHTML();" class="flex items-center px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm transition-colors" title="Open Preview in New Tab">
                    <i data-lucide="eye" class="w-4 h-4 mr-2"></i> Preview
                </button>
                <div class="w-px h-6 bg-slate-600 mx-2"></div>
                <button onclick="Editor.saveProject()" class="flex items-center px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm transition-colors" title="Save Project">
                    <i data-lucide="save" class="w-4 h-4 mr-2"></i> Save
                </button>
                <button onclick="Editor.downloadHTML()" class="flex items-center px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm transition-colors shadow-lg shadow-blue-900/20" title="Export as HTML file">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i> Export HTML
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Unified Sidebar (Elements & Inspect) -->
            <aside class="flex h-full bg-slate-800 border-r border-slate-700 z-40 overflow-hidden shrink-0 select-none">
                
                <!-- LEFT RAIL: Square Icon Buttons -->
                <div class="w-20 bg-slate-900 flex flex-col items-center py-4 gap-2 border-r border-slate-700 shrink-0">
                    <!-- Elements Button -->
                    <button id="tab-btn-elements" onclick="Editor.switchSidebarTab('elements')" class="w-14 h-14 flex flex-col items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-slate-700 transition-all duration-200 border border-transparent hover:border-slate-600" title="Elements">
                        <i data-lucide="layout-grid" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-semibold">Elements</span>
                    </button>
                    
                    <!-- Inspect Button -->
                    <button id="tab-btn-inspect" onclick="Editor.switchSidebarTab('inspect')" class="w-14 h-14 flex flex-col items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-slate-700 transition-all duration-200 border border-transparent hover:border-slate-600" title="Inspect">
                        <i data-lucide="scan-search" class="w-6 h-6"></i>
                        <span class="text-[10px] mt-1 font-semibold">Inspect</span>
                    </button>
                </div>

                <!-- RIGHT CONTENT: Lists & Panels -->
                <div class="flex-1 flex flex-col overflow-hidden w-48">
                    
                    <!-- Header Title (Dynamic) -->
                    <div class="h-16 flex items-center px-4 border-b border-slate-700 bg-slate-800/50 shrink-0">
                        <h2 id="sidebar-title" class="font-semibold text-sm text-slate-300 uppercase tracking-wider">Elements</h2>
                    </div>

                    <!-- TAB: ELEMENTS -->
                    <div id="panel-elements" class="flex-1 overflow-y-auto py-2">
                        <!-- Typography Group -->
                        <details class="group mb-2" open>
                            <summary class="flex items-center justify-between px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700/50 text-xs font-semibold uppercase tracking-wider">
                                Typography
                                <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-open:rotate-180"></i>
                            </summary>
                            <div class="tool-grid">
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h1" title="Heading 1">
                                    <span class="text-xl font-bold">H1</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h2" title="Heading 2">
                                    <span class="text-lg font-bold">H2</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h3" title="Heading 3">
                                    <span class="text-base font-bold">H3</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="p" title="Paragraph">
                                    <i data-lucide="pilcrow" class="w-5 h-5"></i>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h4" title="Heading 4">
                                    <span class="text-sm font-bold">H4</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h5" title="Heading 5">
                                    <span class="text-xs font-bold">H5</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="h6" title="Heading 6">
                                    <span class="text-[10px] font-bold">H6</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="strong" title="Bold Text">
                                    <span class="text-sm font-bold">B</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50 col-span-2" draggable="true" data-type="text" title="Plain Text Block">
                                    <i data-lucide="type" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Text Block</span>
                                </div>
                            </div>
                        </details>

                        <!-- Shapes Group -->
                        <details class="group mb-2">
                            <summary class="flex items-center justify-between px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700/50 text-xs font-semibold uppercase tracking-wider">
                                Shapes
                                <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-open:rotate-180"></i>
                            </summary>
                            <div class="tool-grid">
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="box" title="Box / Container">
                                    <i data-lucide="square" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Box</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="circle" title="Circle">
                                    <i data-lucide="circle" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Circle</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="triangle" title="Triangle">
                                    <i data-lucide="triangle" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Triangle</span>
                                </div>
                            </div>
                        </details>

                        <!-- Visual Group -->
                        <details class="group mb-2">
                            <summary class="flex items-center justify-between px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700/50 text-xs font-semibold uppercase tracking-wider">
                                Visual
                                <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-open:rotate-180"></i>
                            </summary>
                            <div class="tool-grid">
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="image" title="Image">
                                    <i data-lucide="image" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Image</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="video" title="Video Embed">
                                    <i data-lucide="video" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Video</span>
                                </div>
                            </div>
                        </details>

                        <!-- Forms Group -->
                        <details class="group mb-2">
                            <summary class="flex items-center justify-between px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700/50 text-xs font-semibold uppercase tracking-wider">
                                Forms
                                <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-open:rotate-180"></i>
                            </summary>
                            <div class="tool-grid">
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="button" title="Button">
                                    <i data-lucide="mouse-pointer" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Button</span>
                                </div>
                                <div class="draggable-tool cursor-grab active:cursor-grabbing flex flex-col items-center justify-center p-2 rounded-lg hover:bg-slate-700 hover:text-blue-400 transition-colors border border-slate-700 hover:border-blue-500/50" draggable="true" data-type="input" title="Input Field">
                                    <i data-lucide="align-justify" class="w-5 h-5 mb-1"></i> <span class="text-[10px]">Input</span>
                                </div>
                            </div>
                        </details>
                    </div>

                    <!-- TAB: INSPECT -->
                    <div id="panel-inspect" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-800">
                        <!-- Inspector Tools -->
                        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
                            <button id="btn-inspector-mode" onclick="Editor.toggleInspector()" class="flex items-center justify-center w-full py-2 bg-slate-700 hover:bg-blue-600 text-white rounded-lg transition-all mb-3 group border border-slate-600">
                                <i data-lucide="mouse-pointer-2" class="w-4 h-4 mr-2 group-hover:scale-110 transition-transform"></i> Select to Find
                            </button>
                            <div class="space-y-1">
                                <label class="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Selected ID</label>
                                <div class="flex items-center bg-slate-900 rounded border border-slate-600 px-2 py-1.5">
                                    <code id="inspector-selected-id" class="text-xs text-blue-300 truncate select-all flex-1 font-mono">None</code>
                                    <button onclick="Editor.copyId()" class="ml-2 text-slate-500 hover:text-white" title="Copy ID"><i data-lucide="copy" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        </div>

                        <!-- Layers Header -->
                        <div class="p-3 bg-slate-800 font-semibold text-sm text-slate-300 flex justify-between items-center border-b border-slate-700 shadow-sm mt-2">
                            Layers
                            <span class="text-xs bg-slate-700 px-2 py-0.5 rounded text-slate-400" id="layer-count">0</span>
                        </div>
                        <div id="layers-list" class="flex-1 overflow-y-auto">
                            <!-- Layer Items Injected Here -->
                        </div>
                    </div>

                </div>
            </aside>

            <!-- Canvas Area -->
            <main id="workspace" class="flex-1 relative overflow-hidden bg-[#0f172a] cursor-default">
                <!-- Wrapper for Transforms (Zoom/Pan) -->
                <div id="canvas-content" class="w-auto h-auto relative origin-top-left">
                    
                    <!-- Background Pages Layer (White Canvas) -->
                    <div id="page-backgrounds" class="absolute top-0 left-0 w-full h-full origin-top-left z-0">
                        <!-- Pages generated by JS -->
                    </div>

                    <!-- Elements Container -->
                    <div id="canvas-elements" class="absolute top-0 left-0 w-full h-full origin-top-left z-10">
                        <!-- Dynamic Elements -->
                    </div>
                    
                    <!-- Selection Overlay -->
                    <div id="selection-overlay" class="z-20">
                        <div class="resize-handle handle-nw" data-handle="nw" title="Resize"></div>
                        <div class="resize-handle handle-n" data-handle="n" title="Resize Height"></div>
                        <div class="resize-handle handle-ne" data-handle="ne" title="Resize"></div>
                        <div class="resize-handle handle-e" data-handle="e" title="Resize Width"></div>
                        <div class="resize-handle handle-se" data-handle="se" title="Resize"></div>
                        <div class="resize-handle handle-s" data-handle="s" title="Resize Height"></div>
                        <div class="resize-handle handle-sw" data-handle="sw" title="Resize"></div>
                        <div class="resize-handle handle-w" data-handle="w" title="Resize Width"></div>
                        <!-- Locked indicator on selection -->
                        <div id="locked-indicator" class="hidden absolute -top-8 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[10px] px-2 py-1 rounded-full flex items-center shadow-lg"><i data-lucide="lock" class="w-3 h-3 mr-1"></i> Locked</div>
                    </div>

                    <!-- Page Management Buttons (Inside Canvas) -->
                    <div id="add-page-container" class="absolute left-0 w-full flex justify-center gap-2 pb-10 z-30" style="display:none;">
                         <button onclick="Editor.addPage()" class="flex items-center px-4 py-2 bg-slate-700/50 hover:bg-blue-600 text-white rounded-full backdrop-blur-sm border border-slate-500 transition-all shadow-lg group">
                            <i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-slate-300 group-hover:text-white"></i> Add Page
                        </button>
                        <button onclick="Editor.removePage()" class="flex items-center px-4 py-2 bg-slate-700/50 hover:bg-red-600 text-white rounded-full backdrop-blur-sm border border-slate-500 transition-all shadow-lg group">
                            <i data-lucide="trash" class="w-5 h-5 mr-2 text-slate-300 group-hover:text-white"></i> Remove Page
                        </button>
                    </div>

                </div>
            </main>
        </div>

        <!-- Context Menu (Floating) -->
        <div id="context-menu" class="hidden fixed top-20 left-1/2 -translate-x-1/2 glass-panel text-white p-2 rounded-xl flex items-center gap-4 z-50 shadow-2xl">
             <!-- Position -->
            <div class="flex items-center gap-2 border-r border-slate-600 pr-4">
                <div class="flex flex-col"><label class="text-[9px] text-slate-400">X</label><input id="prop-x" type="number" class="w-10 bg-slate-900 border border-slate-600 rounded text-xs px-1" title="X Position"></div>
                <div class="flex flex-col"><label class="text-[9px] text-slate-400">Y</label><input id="prop-y" type="number" class="w-10 bg-slate-900 border border-slate-600 rounded text-xs px-1" title="Y Position"></div>
            </div>
            
            <!-- Alignment & Format Controls (Dynamic) -->
            <div id="group-text-format" class="flex items-center gap-1 border-r border-slate-600 pr-4" style="display:none;">
                <button id="action-bold" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                <button id="action-italic" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
                <button id="action-underline" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Underline"><i data-lucide="underline" class="w-4 h-4"></i></button>
                <button id="action-strikethrough" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Strikethrough"><i data-lucide="strikethrough" class="w-4 h-4"></i></button>
                <div class="w-px h-4 bg-slate-600 mx-1"></div>
                <button id="action-align-left" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Align Left"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                <button id="action-align-center" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Align Center"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                <button id="action-align-right" class="p-1 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Align Right"><i data-lucide="align-right" class="w-4 h-4"></i></button>
            </div>

            <!-- Style -->
            <div class="flex items-center gap-2 border-r border-slate-600 pr-4">
                <div id="group-bg-color" class="flex flex-col">
                    <label class="text-[9px] text-slate-400">BG</label>
                    <input id="prop-color" type="color" class="w-8 h-6 bg-transparent border-none cursor-pointer" title="Background Color">
                </div>
                 <div id="group-text-color" class="flex flex-col">
                    <label class="text-[9px] text-slate-400">Text</label>

             <!-- Grouping -->
             <div class="flex items-center gap-1 border-r border-slate-600 pr-4">
                 <button id="action-group" class="p-2 hover:bg-slate-700 rounded text-slate-300 hover:text-white hidden" title="Group Selected"><i data-lucide="group"></i></button>
                 <button id="action-ungroup" class="p-2 hover:bg-slate-700 rounded text-slate-300 hover:text-white hidden" title="Ungroup Selected"><i data-lucide="ungroup"></i></button>
                 <button id="action-lock" class="p-2 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Lock/Unlock Element"><i data-lucide="lock" class="w-4 h-4"></i></button>
             </div>

            <!-- Actions -->
            <div class="flex items-center gap-1">
                <button id="action-front" class="p-2 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Bring to Front"><i data-lucide="layers"></i></button>
                <button id="action-back" class="p-2 hover:bg-slate-700 rounded text-slate-300 hover:text-white" title="Send to Back"><i data-lucide="layers" class="rotate-180"></i></button>

                     <i data-lucide="more-horizontal"></i>

            <!-- Advanced Settings Dropdown Panel -->
            <div id="advanced-panel" class="hidden absolute top-full right-0 mt-2 w-64 glass-panel rounded-xl p-4 flex flex-col gap-3">
                
                <!-- Content Editor -->
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Edit Content</label>
                    <textarea id="prop-content" class="w-full h-20 bg-slate-900 border border-slate-600 rounded p-2 text-xs focus:outline-none focus:border-blue-500 resize-none" placeholder="Element content..."></textarea>
                    <div class="flex flex-col"><label class="text-[9px] text-slate-400">Width</label><input id="prop-w" type="number" class="w-full bg-slate-900 border border-slate-600 rounded text-xs px-1" title="Width"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-slate-400">Height</label><input id="prop-h" type="number" class="w-full bg-slate-900 border border-slate-600 rounded text-xs px-1" title="Height"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-slate-400">Rotation</label><input id="prop-rotation" type="number" class="w-full bg-slate-900 border border-slate-600 rounded text-xs px-1" title="Rotation (degrees)"></div>
                </div>
                
                <!-- Opacity -->
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between">
                         <label class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Opacity</label>
                         <span id="prop-opacity-val" class="text-[10px] text-slate-300">100%</span>
                    </div>
                    <input id="prop-opacity" type="range" min="0" max="1" step="0.1" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Border Controls -->
                <div id="group-border" class="flex flex-col gap-2 pt-2 border-t border-slate-700">
                    <label class="text-[10px] text-slate-400 uppercase tracking-wider font-bold">Border</label>
                    <div class="flex items-center gap-2">
                        <div class="flex flex-col flex-1">
                             <label class="text-[9px] text-slate-500">Width (px)</label>
                             <input id="prop-border-width" type="number" min="0" class="w-full bg-slate-900 border border-slate-600 rounded text-xs px-2 py-1">
                        </div>
                         <div class="flex flex-col">
                             <label class="text-[9px] text-slate-500">Color</label>
                             <input id="prop-border-color" type="color" class="w-8 h-6 bg-transparent border-none cursor-pointer">
                        </div>
                    </div>
